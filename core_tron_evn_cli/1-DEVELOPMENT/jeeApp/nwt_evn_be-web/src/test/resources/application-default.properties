# Environment name to be compared to source field of event header
app.env.description=/WISP04/

# Application display name for Servlet-based applications
server.servlet.application-display-name=nwt_evn_be-web

spring.application.name=nwt_evn_be-web

# This property defines the active Spring profile.
app.env.spring.active.profile=demo

# Required to overwrite mvc autoconfiguration bean
spring.main.allow-bean-definition-overriding = true

# Disable Spring Security
spring.security.enabled=false

# Use GSON json converter instead of default converter
spring.http.converters.preferred-json-mapper=gson

# Log level
#logging.level.root=DEBUG


#--------------------------
# Kafka auth configuration:
#--------------------------
spring.kafka.properties.bootstrap.servers=pkc-e8mp5.eu-west-1.aws.confluent.cloud:9092
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=OAUTHBEARER
spring.kafka.properties.sasl.oauthbearer.token.endpoint.url=https://login.microsoftonline.com/93ad25dd-8cdc-4066-9727-31a8a3024f80/oauth2/v2.0/token
spring.kafka.properties.sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId='725a3ad1-e4f0-4cb4-a22e-72c7257ce535' scope='api://APP-REEF-KFK/.default' clientSecret='${OAUTH_CLIENT_SECRET}' extension_logicalCluster='lkc-zm9yo0' extension_identityPoolId='pool-WkB7';
spring.kafka.properties.bearer.auth.credentials.source=OAUTHBEARER
spring.kafka.properties.bearer.auth.issuer.endpoint.url=https://login.microsoftonline.com/93ad25dd-8cdc-4066-9727-31a8a3024f80/oauth2/v2.0/token
spring.kafka.properties.bearer.auth.client.id=725a3ad1-e4f0-4cb4-a22e-72c7257ce535
spring.kafka.properties.bearer.auth.client.secret=${OAUTH_CLIENT_SECRET}
spring.kafka.properties.bearer.auth.scope=api://APP-REEF-KFK/.default
spring.kafka.properties.bearer.auth.logical.cluster=lsrc-12mdzj
spring.kafka.properties.bearer.auth.identity.pool.id=pool-WkB7

spring.kafka.properties.schema.registry.url=https://psrc-68gz8.us-east-2.aws.confluent.cloud
spring.kafka.properties.schema.registry.proxy.host=proxy.glb.mapfre.net
spring.kafka.properties.schema.registry.proxy.port=80

# Tells Schema Registry that we will be using a specific Avro type, otherwise Kafka will expect GenericRecord to be used on the topic
spring.kafka.properties.specific.avro.reader=true

# Automatically commit offsets periodically (5s or value defined in auto.commit.interval.ms)
spring.kafka.consumer.enable-auto-commit=false

# read_committed consumer will only read up to the "Last Stable Offset" and filter out any transactional messages which have been aborted
spring.kafka.consumer.isolation.level=read_committed

# Whether to consume from the beginning of a topic partition (earliest) or to only consume new messages (latest) when there is no initial offset for the consumer group
spring.kafka.consumer.auto-offset-reset=earliest

# Specifies the deserializer class for consumer keys/values
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=io.confluent.kafka.serializers.KafkaAvroDeserializer

# Ensures that duplicates are not introduced due to unexpected retries
spring.kafka.producer.properties.enable.idempotence=true

# Prefix for transactional.id
spring.kafka.producer.transaction-id-prefix=tx-${random.uuid}

# Specifies the deserializer class for producer keys/values
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

#---------------
# Error handler:
#---------------

app.env.kafka.error.handler.interval=1000
app.env.kafka.error.handler.retries=2


#--------------------------
# Synchronization consumer:
#--------------------------
# Sync consumer group
app.env.kafka.sync.insured.group=consumer-sync-insured-subscriber

# topic id to listen to
app.env.kafka.topic.activity.id=map.tron.trn.esp.cdc.thp.activity

# enable or disable this consumer
app.env.kafka.sync.insured.enabled=false


#---------------------
# Enrichment consumer:
#---------------------
# Enriching consumer group
app.env.kafka.enriching.insured.group=consumer-enriching-insured-subscriber

# topic id to listen to
app.env.kafka.topic.insured.id=map.tron.trn.esp.cdc.thp.insured

# enable or disable this consumer
app.env.kafka.enriching.insured.enabled=true


