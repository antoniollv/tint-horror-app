# required to overwrite mvc autoconfiguration bean

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
# actuator
management.endpoints.web.exposure.include=*
#swagger
prop.swagger.enabled=true

# LdapHealthIndicator
management.health.ldap.enabled=false
# MailHealthIndicator
management.health.mail.enabled=false

server.servlet.context-path=${app.url.contextroot}

spring.datasource.nwt.connection-timeout=20000
spring.datasource.nwt.minimum-idle= 10
spring.datasource.nwt.maximum-pool-size= 10
spring.datasource.nwt.idle-timeout=10000
spring.datasource.nwt.max-lifetime= 1000
spring.datasource.nwt.auto-commit=true
spring.datasource.nwt.jdbc-url=${app.env.nwt.datasource.url}
spring.datasource.nwt.username=${app.env.nwt.datasource.u}
spring.datasource.nwt.password=${app.env.nwt.datasource.p}
spring.datasource.nwt.pool-name=nwt-pool-cmn
spring.datasource.nwt.connection-test-query=SELECT 1 FROM DUAL
spring.datasource.nwt.type=com.zaxxer.hikari.HikariDataSource


