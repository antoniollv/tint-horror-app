#
# This file is used to define properties that change in different deployable environments.
#

# This property defines the active Spring profile.
#
app.env.spring.active.profile=${app.env.spring.active.profile}
#
# This property defines the active Spring profile access (Newtron / Tronweb).
#
app.env.spring.active.profile.user=${app.env.spring.active.profile.user}
#
# This property defines the server where the application is going to be deployed.
# It is used to obtain the data base connection.
#
app.env.server.type=${app.env.server.type}
#
# This property set if GaiaRestExceptionHandler is enabled, for handler exception and transform to GaiaSoaException
#
gaia.env.rest.exceptionHanlder.enabled=${gaia.env.rest.exceptionHanlder.enabled}
#
# This property defines the number of StackTrace that are shown in a GaiaSoaExceptionInfo
#
app.env.soa.error.max-stack-trace-elements=${app.env.soa.error.max-stack-trace-elements}
#
#This property defines the application name that is shown in GaiaSoaExceptionInfo
#
app.env.name=${app.env.name}
#
#These properties define the connection data for DB access
#
