strips:
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '33%'
            y: '27%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter I'
            fontSize: '48px'
      - vignette: 'cap1-1.svg'
        bubbles: 
          - x: '48%'
            y: '10%'
            arrowPosition: 'bottom-left'
            text: 'How are you Tint?'
            fontSize: '32px'
      - vignette: 'cap1-2.svg'
        bubbles: []
      - vignette: 'cap1-3.svg'
        bubbles: 
          - x: '27%'
            y: '20%'
            arrowPosition: 'right-bottom'
            text: "I see, EXPLOSIVE!"
            fontSize: '32px'
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '31%'
            y: '27%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter II'
            fontSize: '48px'
      - vignette: 'cap2-1.svg'
        bubbles: 
          - x: '28%'
            y: '3%'
            arrowPosition: 'right-bottom'
            text: 'Look, Tint! The rats flee from the boat'
            fontSize: '32px'
      - vignette: 'cap2-2.svg'
        bubbles:
          - x: '48%'
            y: '16%'
            arrowPosition: 'bottom-left'
            text: 'Well, not all rats'
            fontSize: '32px'
      - vignette: 'cap2-3.svg'
        bubbles: 
          - x: '40%'
            y: '5%'
            arrowPosition: 'bottom-left'
            text: "When the ship sinks, only the damned remain"
            fontSize: '32px'
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '31%'
            y: '27%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter III'
            fontSize: '48px'
      - vignette: 'cap3-1.svg'
        bubbles: 
          - x: '42%'
            y: '10%'
            arrowPosition: 'bottom-left'
            text: 'But Tint, I don´t carry any curse and here I am'
            fontSize: '32px'
      - vignette: 'cap3-2.svg'
        bubbles: 
          - x: '55%'
            y: '12%'
            arrowPosition: 'bottom-left'
            text: 'Telas, are you sure of that?'
            fontSize: '40px'
      - vignette: 'cap3-3.svg'
        bubbles: 
          - x: '48%'
            y: '8%'
            arrowPosition: 'bottom-right'
            text: 'I suppose so. Some of us carry our own curse, while others are carried by their curse.'
            fontSize: '36px'
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '31%'
            y: '27%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter IV'
            fontSize: '48px'
      - vignette: 'cap4-1.svg'
        bubbles:
          - x: '55%'
            y: '35%'
            arrowPosition: 'left-bottom'
            text: 'I don´t know. Do you think it´s a good idea?'
            fontSize: '32px'
          - x: '29%'
            y: '40%'
            arrowPosition: 'bottom-right'
            text: 'The wind carries you away. Shall we exchange curses?'
            fontSize: '32px'
      - vignette: 'cap4-2.svg'
        bubbles:
          - x: '32%'
            y: '11%'
            arrowPosition: 'bottom-right'
            text: 'How lightweight! I like it. And what about you?'
            fontSize: '38px'
      - vignette: 'cap4-3.svg'
        bubbles: []
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '31%'
            y: '27%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter V'
            fontSize: '48px'
      - vignette: 'cap5-1.svg'
        bubbles:
          - x: '45%'
            y: '20%'
            arrowPosition: 'bottom-left'
            text: 'We left the curses as they were'
            fontSize: '32px'
          - x: '50%'
            y: '50%'
            arrowPosition: 'bottom-right'
            text: 'Ok'
            fontSize: '32px'
      - vignette: 'cap5-2.svg'
        bubbles: 
          - x: '30%'
            y: '18%'
            arrowPosition: 'bottom-right'
            text: 'You know, I´ve realized that... my condemnation becomes what I think about.'
            fontSize: '30px'
          - x: '47%'
            y: '15%'
            arrowPosition: 'bottom-right'
            text: 'Well, don´t think about white sharks.'
            fontSize: '32px'
      - vignette: 'cap5-3.svg'
        bubbles: 
          - x: '36%'
            y: '15%'
            arrowPosition: 'bottom-left'
            text: 'See you later, Tint!'
            fontSize: '32px'
          - x: '33%'
            y: '68%'
            arrowPosition: 'right-bottom'
            text: 'HELP!'
            fontSize: '42px'
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '31%'
            y: '27%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter VI'
            fontSize: '48px'
      - vignette: 'cap6-1.svg'
        bubbles: 
          - x: '33%'
            y: '23%'
            arrowPosition: 'bottom-right'
            text: 'We are alone on the boat'
            fontSize: '34px'
      - vignette: 'cap6-2.svg'
        bubbles:
          - x: '40%'
            y: '9%'
            arrowPosition: 'none'
            text: 'Are you sure? Tint'
            fontSize: '50px'
      - vignette: 'cap6-3.svg'
        bubbles: 
          - x: '38%'
            y: '40%'
            arrowPosition: 'none'
            text: "Under construction!"
            fontSize: '50px'
