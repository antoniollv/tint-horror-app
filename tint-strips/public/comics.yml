strips:
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '12%'
            y: '28%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter I'
            fontSize: 'clamp(12px, 2vw, 48px)'
      - vignette: 'cap1-1.svg'
        bubbles: 
          - x: '43%'
            y: '15%'
            arrowPosition: 'bottom-left'
            text: 'How are you Tint?'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap1-2.svg'
        bubbles: []
      - vignette: 'cap1-3.svg'
        bubbles: 
          - x: '1%'
            y: '22%'
            arrowPosition: 'right-bottom'
            text: "I see, EXPLOSIVE!"
            fontSize: 'clamp(10px, 2vw, 32px)'
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '12%'
            y: '28%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter II'
            fontSize: 'clamp(12px, 2vw, 48px)'
      - vignette: 'cap2-1.svg'
        bubbles: 
          - x: '10%'
            y: '10%'
            arrowPosition: 'right-bottom'
            text: 'Look, Tint! The rats flee from the boat'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap2-2.svg'
        bubbles:
          - x: '38%'
            y: '13%'
            arrowPosition: 'bottom-left'
            text: 'Well, not all rats'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap2-3.svg'
        bubbles: 
          - x: '30%'
            y: '10%'
            arrowPosition: 'bottom-left'
            text: "When the ship sinks, only the damned remain"
            fontSize: 'clamp(10px, 2vw, 32px)'
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '10%'
            y: '28%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter III'
            fontSize: 'clamp(12px, 2vw, 48px)'
      - vignette: 'cap3-1.svg'
        bubbles: 
          - x: '32%'
            y: '10%'
            arrowPosition: 'bottom-left'
            text: 'But Tint, I don´t carry any curse and here I am'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap3-2.svg'
        bubbles: 
          - x: '58%'
            y: '18%'
            arrowPosition: 'bottom-left'
            text: 'Telas, are you sure of that?'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap3-3.svg'
        bubbles: 
          - x: '43%'
            y: '20%'
            arrowPosition: 'bottom-right'
            text: 'I suppose so. Some of us carry our own curse, while others are carried by their curse.'
            fontSize: 'clamp(10px, 2vw, 32px)'
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '12%'
            y: '28%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter IV'
            fontSize: 'clamp(12px, 2vw, 48px)'
      - vignette: 'cap4-1.svg'
        bubbles:
          - x: '58%'
            y: '38%'
            arrowPosition: 'left-bottom'
            text: 'I don´t know. Do you think it´s a good idea?'
            fontSize: 'clamp(10px, 2vw, 32px)'
          - x: '1%'
            y: '40%'
            arrowPosition: 'bottom-right'
            text: 'The wind carries you away. Shall we exchange curses?'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap4-2.svg'
        bubbles:
          - x: '5%'
            y: '11%'
            arrowPosition: 'bottom-right'
            text: 'How lightweight! I like it. And what about you?'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap4-3.svg'
        bubbles: []
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '12%'
            y: '28%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter V'
            fontSize: 'clamp(12px, 2vw, 48px)'
      - vignette: 'cap5-1.svg'
        bubbles:
          - x: '45%'
            y: '20%'
            arrowPosition: 'bottom-left'
            text: 'We left the curses as they were'
            fontSize: 'clamp(10px, 2vw, 32px)'
          - x: '50%'
            y: '50%'
            arrowPosition: 'bottom-right'
            text: 'Ok'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap5-2.svg'
        bubbles: 
          - x: '5%'
            y: '20%'
            arrowPosition: 'bottom-right'
            text: 'You know, I´ve realized that... my condemnation becomes what I think about.'
            fontSize: 'clamp(10px, 2vw, 32px)'
          - x: '40%'
            y: '7%'
            arrowPosition: 'bottom-right'
            text: 'Well, don´t think about white sharks.'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap5-3.svg'
        bubbles: 
          - x: '25%'
            y: '17%'
            arrowPosition: 'bottom-left'
            text: 'See you later, Tint!'
            fontSize: 'clamp(10px, 2vw, 32px)'
          - x: '18%'
            y: '75%'
            arrowPosition: 'right-bottom'
            text: 'HELP!'
            fontSize: 'clamp(14px, 2vw, 48px)'
  - vignettes:
      - vignette: 'cover.svg'
        bubbles:
          - x: '12%'
            y: '28%'
            arrowPosition: 'none'
            text: 'Restless Ghost - Chapter VI'
            fontSize: 'clamp(12px, 2vw, 48px)'
      - vignette: 'cap6-1.svg'
        bubbles: 
          - x: '20%'
            y: '23%'
            arrowPosition: 'bottom-right'
            text: 'We are alone on the boat'
            fontSize: 'clamp(10px, 2vw, 32px)'
      - vignette: 'cap6-2.svg'
        bubbles:
          - x: '35%'
            y: '9%'
            arrowPosition: 'none'
            text: 'Are you sure? Tint'
            fontSize: 'clamp(14px, 2vw, 64px)'
      - vignette: 'cap6-3.svg'
        bubbles: 
          - x: '20%'
            y: '40%'
            arrowPosition: 'none'
            text: "Under construction!"
            fontSize: 'clamp(18px, 2vw, 74px)'
