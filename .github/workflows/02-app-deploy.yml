name: 02. Deploy App to S3

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment to use'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      tag:
        description: 'Git tag to deploy (default: latest vX.Y.Z)'
        required: false
        type: string

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          set -euo pipefail

          git fetch --tags --force

          TAG_INPUT="${{ inputs.tag }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          fi

          if [ -z "$TAG" ]; then
            echo "No release tag found. Provide an explicit tag to deploy."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        run: |
          set -euo pipefail
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Load config from SSM
        id: load-config
        run: |
          set -euo pipefail

          GITHUB_ORG="${GITHUB_REPOSITORY%%/*}"
          GITHUB_REPO="${GITHUB_REPOSITORY##*/}"
          ENVIRONMENT_INPUT="${{ inputs.environment }}"
          SSM_PREFIX="/${GITHUB_REPO}/${ENVIRONMENT_INPUT}/prerequisites"
          APP_SSM_PREFIX="/${GITHUB_REPO}/${ENVIRONMENT_INPUT}/app"          
          
          APP_BUCKET_NAME=$(aws ssm get-parameter \
            --name "$SSM_PREFIX/app_bucket_name" \
            --query 'Parameter.Value' \
            --output text)

          IAM_ROLE_NAME=$(aws ssm get-parameter \
            --name "$SSM_PREFIX/iam_role_name" \
            --query 'Parameter.Value' \
            --output text)

          IAM_POLICY_NAME=$(aws ssm get-parameter \
            --name "$SSM_PREFIX/iam_policy_name" \
            --query 'Parameter.Value' \
            --output text)

          TF_STATE_BUCKET=$(aws ssm get-parameter \
            --name "$SSM_PREFIX/tf_state_bucket" \
            --query 'Parameter.Value' \
            --output text)

          TF_STATE_KEY=$(aws ssm get-parameter \
            --name "$SSM_PREFIX/tf_state_key" \
            --query 'Parameter.Value' \
            --output text)

          IMAGES_FOLDER=$(aws ssm get-parameter \
            --name "$SSM_PREFIX/images_folder" \
            --query 'Parameter.Value' \
            --output text)          
          
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/${IAM_ROLE_NAME}"

          echo "APP_BUCKET_NAME=$APP_BUCKET_NAME" >> "$GITHUB_ENV"
          echo "GITHUB_ORG=$GITHUB_ORG" >> "$GITHUB_ENV"
          echo "GITHUB_REPO=$GITHUB_REPO" >> "$GITHUB_ENV"
          echo "IAM_ROLE_NAME=$IAM_ROLE_NAME" >> "$GITHUB_ENV"
          echo "IAM_POLICY_NAME=$IAM_POLICY_NAME" >> "$GITHUB_ENV"
          echo "TF_STATE_BUCKET=$TF_STATE_BUCKET" >> "$GITHUB_ENV"
          echo "TF_STATE_KEY=$TF_STATE_KEY" >> "$GITHUB_ENV"
          echo "IMAGES_FOLDER=$IMAGES_FOLDER" >> "$GITHUB_ENV"
          echo "ROLE_ARN=$ROLE_ARN" >> "$GITHUB_ENV"
          echo "SSM_PREFIX=$SSM_PREFIX" >> "$GITHUB_ENV"
          echo "APP_SSM_PREFIX=$APP_SSM_PREFIX" >> "$GITHUB_ENV"          
          
          echo "role_arn=$ROLE_ARN" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$ROLE_ARN"          

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.load-config.outputs.role_arn }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-AppDeploy

      - name: Resolve target bucket
        run: |
          set -euo pipefail

          TARGET_BUCKET=""
          if aws ssm get-parameter --name "$APP_SSM_PREFIX/bucket_name" --query 'Parameter.Value' --output text >/tmp/ssm_bucket 2>/dev/null; then
            TARGET_BUCKET=$(cat /tmp/ssm_bucket)
          fi

          if [ -z "$TARGET_BUCKET" ]; then
            TARGET_BUCKET="$APP_BUCKET_NAME"
          fi

          if [ -z "$TARGET_BUCKET" ]; then
            echo "No target bucket resolved from SSM"
            exit 1
          fi

          echo "TARGET_BUCKET=$TARGET_BUCKET" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tint-strips/package-lock.json

      - name: Install dependencies
        working-directory: tint-strips
        run: npm ci

      - name: Build app
        working-directory: tint-strips
        env:
          VITE_TRANSLATION_API_KEY: "${{ secrets.TRANSLATION_API_KEY }}"
        run: npm run build:${{ inputs.environment }}

      - name: Deploy to S3
        run: |
          set -euo pipefail
          aws s3 sync tint-strips/build "s3://$TARGET_BUCKET" --delete

      - name: Syncronize Buckets
        run: |
          set -euo pipefail
          aws s3 sync "s3://$TF_STATE_BUCKET/$IMAGES_FOLDER" "s3://$TARGET_BUCKET/imgs" --delete

      - name: Finalize
        run: |
          echo "Deployment completed." >> $GITHUB_STEP_SUMMARY
          echo "Release tag: ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
